<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Blog — Savings Tips, Recipes &amp; Fresh Ideas | FreshMart</title>
<meta name="description" content="Savings tips, seasonal produce guides, recipes and loyalty program insights from the FreshMart team." />
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛒</text></svg>" />
<link rel="canonical" href="blog.html" />

<script>
(function(){
  var t = localStorage.getItem('fm-theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  var d = localStorage.getItem('fm-dir') || 'ltr';
  document.documentElement.classList.toggle('dark', t === 'dark');
  document.documentElement.setAttribute('dir', d);
})();
</script>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" />

<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: { extend: { fontFamily: {
      sans: ['Inter', 'ui-sans-serif', 'system-ui'],
      display: ['"Plus Jakarta Sans"', 'Inter', 'sans-serif'],
    } } },
  };
</script>

<link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css" />
<link rel="stylesheet" href="assets/css/style.css" />
</head>
<body data-page="blog.html" class="bg-[hsl(var(--fm-surface))] text-[hsl(var(--fm-ink))] antialiased">
<a href="#main-content" class="fm-skip-link">Skip to main content</a>

<div id="preloader" aria-hidden="true">
  <div class="fm-basket-loader">
    <svg viewBox="0 0 64 64" fill="none">
      <path class="fm-basket-path" d="M10 22h44l-5 30H15L10 22Z" stroke="#16a34a" stroke-width="3" stroke-linejoin="round"/>
      <path class="fm-basket-path" d="M20 22c0-8 5-14 12-14s12 6 12 14" stroke="#f97316" stroke-width="3" stroke-linecap="round"/>
    </svg>
  </div>
</div>

<!-- Preloader failsafe: independent of every other script tag below, so
     a hung/blocked CDN request (fonts, GSAP, Swiper, etc.) can never
     leave the loading screen stuck (and thus never leave the page
     feeling "unresponsive" to scroll/clicks for several seconds). -->
<script>
  setTimeout(function () {
    var el = document.getElementById('preloader');
    if (el) el.classList.add('fm-loaded');
  }, 4000);
</script>

<div id="scroll-progress" aria-hidden="true"></div>
<div id="fm-page-transition" aria-hidden="true"></div>

<header id="site-header" class="fixed inset-x-0 top-0 z-50 border-b border-transparent"></header>

<main id="main-content">
  <div id="breadcrumb" data-title="FreshMart Blog" data-subtitle="Savings tips, seasonal produce guides, recipes and behind-the-scenes stories." data-crumbs='[{"label":"Blog","href":"blog.html"}]'></div>

  <section class="mx-auto max-w-7xl px-6 py-20 md:py-28">
    <div class="grid gap-12 lg:grid-cols-3">
      <div class="lg:col-span-2">
        <div id="blog-grid" class="grid gap-8 sm:grid-cols-2"></div>
        <nav aria-label="Blog pagination" class="mt-12 flex items-center justify-center gap-2">
          <a href="#" class="flex h-10 w-10 items-center justify-center rounded-full border border-[hsl(var(--fm-border))] hover:border-emerald-500"><i class="ri-arrow-left-s-line"></i></a>
          <a href="#" class="flex h-10 w-10 items-center justify-center rounded-full bg-emerald-600 text-sm font-bold text-white">1</a>
          <a href="#" class="flex h-10 w-10 items-center justify-center rounded-full border border-[hsl(var(--fm-border))] text-sm font-bold hover:border-emerald-500">2</a>
          <a href="#" class="flex h-10 w-10 items-center justify-center rounded-full border border-[hsl(var(--fm-border))] text-sm font-bold hover:border-emerald-500">3</a>
          <a href="#" class="flex h-10 w-10 items-center justify-center rounded-full border border-[hsl(var(--fm-border))] hover:border-emerald-500"><i class="ri-arrow-right-s-line"></i></a>
        </nav>
      </div>

      <aside class="space-y-6">
        <div class="rounded-2xl border border-[hsl(var(--fm-border))] bg-[hsl(var(--fm-surface))] p-6">
          <div class="flex items-center gap-3 rounded-full border border-[hsl(var(--fm-border))] px-4 py-2.5">
            <i class="ri-search-line text-[hsl(var(--fm-ink))]/50"></i>
            <input type="search" placeholder="Search articles..." class="w-full bg-transparent text-sm outline-none" />
          </div>
        </div>
        <div class="rounded-2xl border border-[hsl(var(--fm-border))] bg-[hsl(var(--fm-surface))] p-6">
          <h3 class="font-display text-base font-bold">Categories</h3>
          <ul id="blog-categories" class="mt-4 space-y-1 text-sm"></ul>
        </div>
        <div class="rounded-2xl border border-[hsl(var(--fm-border))] bg-[hsl(var(--fm-surface))] p-6">
          <h3 class="font-display text-base font-bold">Recent Posts</h3>
          <ul id="blog-recent" class="mt-4 space-y-4 text-sm"></ul>
        </div>
        <div class="fm-loyalty-card rounded-2xl p-6 text-white">
          <i class="ri-mail-send-line relative text-3xl text-amber-300"></i>
          <h3 class="relative mt-3 font-display text-lg font-bold">Weekly deals in your inbox</h3>
          <form data-demo-form class="relative mt-4 space-y-2" onsubmit="return false;">
            <label for="sidebar-email" class="sr-only">Email address</label>
            <input id="sidebar-email" type="email" required placeholder="you@email.com" class="w-full rounded-full bg-white/15 px-4 py-2.5 text-sm placeholder-white/70 outline-none" />
            <button type="submit" class="fm-btn relative flex w-full items-center justify-center gap-2 rounded-full bg-amber-400 py-2.5 text-sm font-bold text-emerald-950">Subscribe</button>
          </form>
        </div>
      </aside>
    </div>
  </section>
</main>

<footer id="site-footer"></footer>

<button id="back-to-top" aria-label="Back to top" class="fixed bottom-6 right-6 z-40 flex h-12 w-12 items-center justify-center rounded-full bg-emerald-600 text-white shadow-xl">
  <i class="ri-arrow-up-line text-xl"></i>
</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://unpkg.com/lenis@1.1.16/dist/lenis.min.js"></script>
<script src="https://unpkg.com/split-type@0.3.4"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/typed.js@2.1.0/dist/typed.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/countup.js@2.8.0/dist/countUp.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
<script src="https://unpkg.com/isotope-layout@3/dist/isotope.pkgd.min.js"></script>

<script src="assets/js/data.js"></script>
<script src="assets/js/components.js"></script>
<script src="assets/js/theme.js"></script>
<script src="assets/js/render.js"></script>
<script src="assets/js/countdown.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    FmRender.mount('blog-grid', FM_BLOG_POSTS, FmRender.blogCard);

    const cats = [...new Set(FM_BLOG_POSTS.map(p => p.category))];
    document.getElementById('blog-categories').innerHTML = cats.map(c => `
      <li><a href="blog.html" class="flex items-center justify-between rounded-lg px-3 py-2 hover:bg-[hsl(var(--fm-surface-alt))] hover:text-emerald-600"><span>${c}</span><i class="ri-arrow-right-s-line"></i></a></li>`).join('');

    document.getElementById('blog-recent').innerHTML = FM_BLOG_POSTS.slice(0,3).map(p => `
      <li class="flex items-start gap-3">
        <span class="flex h-12 w-12 shrink-0 items-center justify-center rounded-xl bg-emerald-500/10 text-emerald-600"><i class="ri-article-line"></i></span>
        <div>
          <a href="blog-details.html" class="line-clamp-2 font-semibold hover:text-emerald-600">${p.title}</a>
          <p class="mt-1 text-xs text-[hsl(var(--fm-ink))]/50">${p.date}</p>
        </div>
      </li>`).join('');
  });
</script>
<script src="assets/js/main.js"></script>
</body>
</html>
